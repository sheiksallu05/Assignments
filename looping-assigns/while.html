let d = 1;

}

let ng = parseInt(prompt("Enter limit"));
let g = 0;
let suiii = 0;

while (g <= ng) {
    suiii = suiii + g;
    g += 5;
}

console.log("Sum = " + suiii);

//--------9----------

let nh = parseInt(prompt("Enter limit"));
let h = 1;
let sumh = 0;

while (h <= nh) {

    let fact = 1;
    let j = 1;

    while (j <= h) {
        fact = fact * j;
        j++;
    }

    sumh = sumh + (h / fact);
    h++;
}

console.log("Sum = " + sumh);

//--------10----------
let nj = parseInt(prompt("Enter limit"));
let j = 0;
let sumj = 0;

while (j <= nj) {

    let fact = 1;
    let k = 1;

    while (k <= j) {
        fact = fact * k;
        k++;
    }

    sumj = sumj + (j / fact);
    j += 2;
}

console.log("Sum = " + sumj);
