<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Selectors</title>
    <style> 
        /* Element Selector */
p {
    color: #555;
    line-height: 1.6;
}
/* Class Selector */
.intro {
    font-style: italic;
}
/* Class Selector */
.highlight {
    background-color: #f0f8ff;
    padding: 8px;
}
/* ID Selector */
#header {
    color: #2c3e50;
    font-size: 32px;
}
/* Class Selector */
.box {
    border: 1px solid #ccc;
    padding: 16px;
}
    </style>
        
</head>
<body>

    <h1 id="header">Welcome to CSS Selectors</h1>

    <p class="intro">
        This is an introduction paragraph.
    </p>

    <p class="highlight">
        This paragraph is highlighted.
    </p>

    <div class="box">
        <p>
            This paragraph is inside a box.
        </p>
    </div>

</body>
</html>
